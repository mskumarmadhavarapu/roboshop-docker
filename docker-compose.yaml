services:
  catalogue:
    build:
      dockerfile: catalogue.Dockerfile
    image: mskumarmadhavarapu/catalogue:1.0.0 
    container_name: catalogue
    depends_on:
    - mongodb
  user:
    build:
      dockerfile: user.Dockerfile
    image: mskumarmadhavarapu/user:1.0.0
    container_name: user
    depends_on:
    - redis
  frontend:
    build:
      dockerfile: frontend.Dockefile
    image: mskumarmadhavarapu/frontend:1.0.0
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
    - user
  mongodb:
    build:
      dockerfile: mongodb.Dockerfile # it moves to mongodb directory
    image: mskumarmadhavarapu/mongodb:1.0.0 # docker build -t mskumarmadhavarapu/mongodb:1.0.0
    container_name: mongodb
  redis:
    build: redis:7.0
    container_name: redis
  networks:
   default:
    driver: bridge
    name: roboshop
    external: false # if true, you need to create network manually