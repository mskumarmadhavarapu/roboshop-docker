services:
  catalogue:
    build: ./catalogue
    image: mskumarmadhavarapu/catalogue:1.0.0 
    container_name: catalogue
    depends_on:
    - mongodb
  user:
    build: ./user
    image: mskumarmadhavarapu/user:1.0.0
    container_name: user
    depends_on:
    - redis
  cart:
    build: ./cart
    image: mskumarmadhavarapu/cart:1.0.0
    container_name: cart
    depends_on:
    - redis
  shipping:
    build: ./shipping
    image: mskumarmadhavarapu/shipping:1.0.0
    container_name: shipping
    depends_on:
    - mysql
  frontend:
    build: ./frontend
    image: mskumarmadhavarapu/frontend:1.0.0
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
    - user
    - cart
    - shipping
  mongodb:
    build: ./mongodb
    image: mskumarmadhavarapu/mongodb:1.0.0 # docker build -t mskumarmadhavarapu/mongodb:1.0.0
    container_name: mongodb
  redis:
    image: redis:7.0
    container_name: redis
  mysql:
    build: ./mysql
    image: mskumarmadhavarapu/mysql:1.0.0
    container_name: mysql
  rabbitmq:
    image: rabbitmq:3
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
    container_name: rabbitmq
networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if true, you need to create network manually